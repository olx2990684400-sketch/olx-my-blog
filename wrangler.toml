name = "my-blog"
compatibility_date = "2026-06-21" # 更为今日
main = "src/worker.js"

[assets]
directory = "./dist"

[vars]
NODE_VERSION = "22"
# Umami 统计配置
UMAMI_API_URL = "https://umami.fqzlr.com"
UMAMI_WEBSITE_ID = "4f4d87b0-bf0f-403a-a7c1-71962537673a"

# 敏感信息请在 Cloudflare Dashboard → Workers & Pages →
# 你的 Worker → Settings → Variables and Secrets 中添加 Secret：
# AI_API_KEY
# UMAMI_TOKEN
# 可选变量：
# ALLOWED_ORIGINS = "https://your-domain.example"

[[kv_namespaces]]
binding = "VISITOR_KV"
id = "2720087758cb476eb24fd8dd4efb3e4c"

[[vectorize]]
binding = "VECTORIZE"
index_name = "blog-ai-search"

[ai]
binding = "AI"
